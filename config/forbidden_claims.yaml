forbidden_claims:
  - "guaranteed to reduce bugs"
  - "eliminates all security vulnerabilities"
  - "replaces human code reviewers"
  - "100% accuracy"
  - "zero false positives"
  - "industry-leading"
  - "best in class"
  - "the only solution"
  - "no other tool"
  - "saves millions"
  - "10x developer productivity"
  - "revolutionary"
  - "game-changing"
  - "cutting-edge"
  - "state-of-the-art"
  - "world-class"

requires_evidence:
  - pattern: "reduces review time by X%"
    requirement: "Must cite specific study, customer data, or benchmark"
  - pattern: "catches X% of bugs"
    requirement: "Must cite specific benchmark or evaluation methodology"
  - pattern: "teams using Macroscope"
    requirement: "Must reference actual customer or anonymized case study"
  - pattern: "compared to manual review"
    requirement: "Must cite specific comparison study or methodology"
