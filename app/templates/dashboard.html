<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Macroscope Pipeline Dashboard</title>
    <link rel="stylesheet" href="/static/dashboard.css?v=20260323-codex-shell" />
  </head>
  <body>
    <div class="app-shell">
      <aside id="sidebar" class="sidebar" aria-label="Pipeline runs">
        <div class="sidebar-brand">
          <p class="eyebrow">Macroscope SEO Engine</p>
          <h1>Runs</h1>
          <p id="run-selection-note" class="sidebar-note">Select a run to inspect its pipeline.</p>
        </div>

        <div class="sidebar-section">
          <div class="sidebar-section-head">
            <span class="sidebar-label">History</span>
          </div>
          <div id="recent-runs" class="thread-list"></div>
        </div>
      </aside>

      <button
        id="sidebar-backdrop"
        class="sidebar-backdrop"
        type="button"
        hidden
        aria-label="Close runs sidebar"
      ></button>

      <main class="workspace">
        <header class="workspace-bar">
          <div class="workspace-bar-main">
            <button
              id="sidebar-toggle"
              class="icon-button sidebar-toggle"
              type="button"
              aria-label="Open runs sidebar"
            >
              <span></span>
              <span></span>
              <span></span>
            </button>

            <div class="workspace-brand">
              <p class="eyebrow">Macroscope SEO Engine</p>
              <h2>Pipeline workspace</h2>
            </div>
          </div>

          <div class="workspace-bar-side">
            <div class="status-group">
              <div class="status-chip">
                <span>Status</span>
                <strong id="system-status">Loading...</strong>
              </div>
              <div class="status-chip status-chip--wide">
                <span>Active run</span>
                <strong id="active-run">None</strong>
              </div>
            </div>

            <div class="toolbar-actions">
              <button id="run-now" class="primary-button">Run pipeline</button>
              <button id="stop-run" class="danger-button">Stop run</button>
              <button id="resume-run" class="secondary-button">Resume run</button>
              <button id="refresh" class="secondary-button">Refresh</button>
            </div>
          </div>
        </header>

        <div class="workspace-scroll">
          <p id="flash-message" class="flash-message"></p>

          <section class="run-header">
            <div class="run-header-copy">
              <p id="pipeline-run-id" class="run-id-pill">Waiting for a run</p>
              <h3 id="pipeline-title">Select a run from the sidebar</h3>
              <p id="pipeline-meta" class="run-meta-line">
                Start a run to see the pipeline progress here.
              </p>
            </div>
            <p id="run-banner" class="run-banner" hidden></p>
          </section>

          <section id="stage-list" class="stage-list"></section>
        </div>
      </main>
    </div>

    <script>
      const NO_EXPANDED_STAGE = "__none__";
      const STORAGE_KEYS = {
        selectedRunId: "macroscope.dashboard.selectedRunId",
        expandedStages: "macroscope.dashboard.expandedStages",
      };

      function readStoredJson(key, fallback) {
        try {
          const raw = window.sessionStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch (_error) {
          return fallback;
        }
      }

      const state = {
        selectedRunId: window.sessionStorage.getItem(STORAGE_KEYS.selectedRunId),
        selectedRunDetail: null,
        expandedStage: null,
        expandedStagesByRun: readStoredJson(STORAGE_KEYS.expandedStages, {}),
        status: null,
        sidebarOpen: false,
      };

      const els = {
        sidebar: document.getElementById("sidebar"),
        sidebarBackdrop: document.getElementById("sidebar-backdrop"),
        sidebarToggle: document.getElementById("sidebar-toggle"),
        systemStatus: document.getElementById("system-status"),
        activeRun: document.getElementById("active-run"),
        runNow: document.getElementById("run-now"),
        stopRun: document.getElementById("stop-run"),
        resumeRun: document.getElementById("resume-run"),
        refresh: document.getElementById("refresh"),
        flashMessage: document.getElementById("flash-message"),
        recentRuns: document.getElementById("recent-runs"),
        runSelectionNote: document.getElementById("run-selection-note"),
        pipelineRunId: document.getElementById("pipeline-run-id"),
        pipelineTitle: document.getElementById("pipeline-title"),
        pipelineMeta: document.getElementById("pipeline-meta"),
        runBanner: document.getElementById("run-banner"),
        stageList: document.getElementById("stage-list"),
      };

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function truncate(value, maxLength = 220) {
        const text = String(value ?? "").trim();
        if (text.length <= maxLength) {
          return text;
        }
        return `${text.slice(0, maxLength - 1).trimEnd()}...`;
      }

      function formatDuration(value) {
        if (value === null || value === undefined || Number.isNaN(Number(value))) {
          return "—";
        }
        const numeric = Number(value);
        if (numeric < 1) {
          return `${Math.max(1, Math.round(numeric * 1000))}ms`;
        }
        if (numeric < 10) {
          return `${numeric.toFixed(2)}s`;
        }
        return `${numeric.toFixed(1)}s`;
      }

      function showFlash(message, tone = "neutral") {
        els.flashMessage.textContent = message;
        els.flashMessage.dataset.tone = tone;
      }

      function normalizeErrorMessage(error) {
        const raw = String(error?.message || error || "").trim();
        if (!raw || raw === "Failed to fetch") {
          return "Dashboard server is unavailable. Restart `./.venv/bin/python -m app.main dashboard` and refresh.";
        }
        return raw;
      }

      async function requestJson(url, options = {}) {
        const response = await fetch(url, {
          headers: { "Content-Type": "application/json" },
          ...options,
        });

        if (!response.ok) {
          let detail = `${response.status} ${response.statusText}`;
          try {
            const payload = await response.json();
            detail = payload.detail || detail;
          } catch (_error) {
            // Ignore JSON parsing issues on error responses.
          }
          throw new Error(detail);
        }

        return response.json();
      }

      function runStatusText(status) {
        if (status === "running") return "Running";
        if (status === "resuming") return "Resuming";
        if (status === "stopping") return "Stopping";
        if (status === "completed") return "Completed";
        if (status === "canceled") return "Stopped";
        if (status === "interrupted") return "Interrupted";
        if (status === "failed") return "Failed";
        return "Idle";
      }

      function chooseRunId(status) {
        const available = new Set((status.recent_runs || []).map((run) => run.run_id));
        if (state.selectedRunId && (available.has(state.selectedRunId) || state.selectedRunId === status.active_run_id)) {
          return state.selectedRunId;
        }
        return status.active_run_id || status.recent_runs?.[0]?.run_id || null;
      }

      function defaultExpandedStage(stageViews) {
        const running = stageViews.find((stage) => stage.status === "running");
        if (running) {
          return running.stage;
        }
        const failed = stageViews.find((stage) => stage.status === "failed");
        if (failed) {
          return failed.stage;
        }
        const completed = [...stageViews].reverse().find((stage) => stage.status === "success");
        return completed ? completed.stage : stageViews[0]?.stage ?? null;
      }

      function basename(path) {
        return String(path || "").split("/").pop() || "";
      }

      function persistSelectedRunId() {
        if (state.selectedRunId) {
          window.sessionStorage.setItem(STORAGE_KEYS.selectedRunId, state.selectedRunId);
        } else {
          window.sessionStorage.removeItem(STORAGE_KEYS.selectedRunId);
        }
      }

      function persistExpandedStages() {
        window.sessionStorage.setItem(
          STORAGE_KEYS.expandedStages,
          JSON.stringify(state.expandedStagesByRun),
        );
      }

      function getStoredExpandedStage(runId) {
        if (!runId) {
          return null;
        }
        return Object.prototype.hasOwnProperty.call(state.expandedStagesByRun, runId)
          ? state.expandedStagesByRun[runId]
          : null;
      }

      function setStoredExpandedStage(runId, stageName) {
        if (!runId) {
          return;
        }
        state.expandedStagesByRun[runId] = stageName || NO_EXPANDED_STAGE;
        persistExpandedStages();
      }

      function isDrawerMode() {
        return window.matchMedia("(max-width: 1080px)").matches;
      }

      function syncSidebarState() {
        const open = state.sidebarOpen && isDrawerMode();
        document.body.classList.toggle("drawer-open", open);
        els.sidebarBackdrop.hidden = !open;
      }

      function setSidebarOpen(open) {
        state.sidebarOpen = open;
        syncSidebarState();
      }

      function closeSidebarIfDrawer() {
        if (isDrawerMode()) {
          setSidebarOpen(false);
        }
      }

      function statusIcon(status) {
        if (status === "running") {
          return '<span class="stage-icon stage-icon--spinner" aria-hidden="true"></span>';
        }
        if (status === "success") {
          return '<span class="stage-icon stage-icon--success" aria-hidden="true">✓</span>';
        }
        if (status === "canceled") {
          return '<span class="stage-icon stage-icon--canceled" aria-hidden="true">■</span>';
        }
        if (status === "failed") {
          return '<span class="stage-icon stage-icon--failed" aria-hidden="true">!</span>';
        }
        if (status === "interrupted") {
          return '<span class="stage-icon stage-icon--failed" aria-hidden="true">!</span>';
        }
        return '<span class="stage-icon stage-icon--pending" aria-hidden="true"></span>';
      }

      function statusLabel(status) {
        if (status === "running") return "Running";
        if (status === "resuming") return "Resuming";
        if (status === "stopping") return "Stopping";
        if (status === "success") return "Done";
        if (status === "canceled") return "Stopped";
        if (status === "failed") return "Failed";
        if (status === "interrupted") return "Interrupted";
        return "Waiting";
      }

      function buildRunMeta(run) {
        const parts = [];
        if (run.status) {
          parts.push(runStatusText(run.status));
        }
        if (run.grade) {
          parts.push(run.grade);
        }
        if (run.word_count) {
          parts.push(`${run.word_count} words`);
        }
        if (run.duration_seconds) {
          parts.push(formatDuration(run.duration_seconds));
        }
        return parts.join(" · ");
      }

      function buildRunTitle(run) {
        return truncate(run.topic || "Untitled run", 70);
      }

      function renderRecentRuns() {
        const runs = state.status?.recent_runs || [];
        els.recentRuns.innerHTML = "";

        if (!runs.length) {
          els.recentRuns.innerHTML = '<p class="empty-state">No pipeline runs yet.</p>';
          return;
        }

        runs.forEach((run) => {
          const button = document.createElement("button");
          button.type = "button";
          button.className = `thread-item${run.run_id === state.selectedRunId ? " is-selected" : ""}`;
          button.setAttribute("aria-current", run.run_id === state.selectedRunId ? "true" : "false");
          button.innerHTML = `
            <span class="thread-title">${escapeHtml(buildRunTitle(run))}</span>
            <span class="thread-subline">${escapeHtml(run.run_id)}</span>
            <span class="thread-meta">${escapeHtml(buildRunMeta(run) || "No summary yet")}</span>
          `;
          button.addEventListener("click", async () => {
            state.selectedRunId = run.run_id;
            persistSelectedRunId();
            state.selectedRunDetail = null;
            await loadDashboard();
            closeSidebarIfDrawer();
          });
          els.recentRuns.appendChild(button);
        });
      }

      function renderHeader() {
        const status = state.status || {};
        const running = Boolean(status.running);
        const stopRequested = Boolean(status.stop_requested);
        const detailStatus = state.selectedRunDetail?.status || state.selectedRunDetail?.summary?.status;

        els.systemStatus.textContent = stopRequested
          ? "Stopping"
          : running
            ? (detailStatus === "resuming" ? "Resuming" : "Running")
            : "Idle";
        els.activeRun.textContent = status.active_run_id || "None";

        els.runNow.disabled = running;
        els.stopRun.disabled = !running || stopRequested;
        els.stopRun.textContent = stopRequested ? "Stopping..." : "Stop run";

        const resumable = Boolean(state.selectedRunDetail?.resumable);
        els.resumeRun.disabled = running || !resumable;

        els.runSelectionNote.textContent = state.selectedRunId
          ? `Selected ${state.selectedRunId}`
          : "Select a run to inspect its pipeline.";
      }

      function renderPipelineSummary() {
        const detail = state.selectedRunDetail;
        const summary = detail?.summary || {};
        const selected = detail?.selected_topic?.candidate || {};
        const metaParts = [];
        const runTitle = selected.title || summary.topic_selected || "Untitled run";

        els.pipelineRunId.textContent = detail ? detail.run_id : "Waiting for a run";
        els.pipelineTitle.textContent = detail ? runTitle : "Select a run from the sidebar";

        if (detail?.status) {
          metaParts.push(runStatusText(detail.status));
        }
        if (summary.final_grade) {
          metaParts.push(`Grade ${summary.final_grade}`);
        }
        if (summary.word_count) {
          metaParts.push(`${summary.word_count} words`);
        }
        if (summary.total_duration_seconds) {
          metaParts.push(formatDuration(summary.total_duration_seconds));
        }
        if (detail?.resumed_from_stage) {
          metaParts.push(`Resumed from ${detail.resumed_from_stage}`);
        }

        els.pipelineMeta.textContent = detail
          ? metaParts.join(" · ") || "Waiting for stage updates."
          : "Start a run to see the pipeline progress here.";

        if (summary.success === false && Array.isArray(summary.errors) && summary.errors.length) {
          els.runBanner.hidden = false;
          els.runBanner.textContent = summary.errors[0];
        } else {
          els.runBanner.hidden = true;
          els.runBanner.textContent = "";
        }
      }

      function buildStageDetail(stage, index, totalStages) {
        const detail = state.selectedRunDetail;
        const isExpanded = state.expandedStage === stage.stage;
        const isLastStage = index === totalStages - 1;
        const articleName = basename(detail?.article_path);
        const canExport = isLastStage && detail?.article_path && articleName;
        const artifactName = stage.artifact_path ? basename(stage.artifact_path) : "";
        const traces = stage.traces || [];
        const latestText = stage.latest_preview || stage.latest_prompt || "";
        const detailBlocks = [];

        if (latestText) {
          detailBlocks.push(`
            <section class="detail-section">
              <h4>Latest</h4>
              <p class="detail-text">${escapeHtml(truncate(latestText, 240))}</p>
            </section>
          `);
        }

        if (traces.length) {
          detailBlocks.push(`
            <section class="detail-section">
              <h4>What happened</h4>
              <ul class="trace-list">
                ${traces
                  .map(
                    (trace) => `
                      <li class="trace-item">
                        <strong>${escapeHtml(trace.message || "Stage update")}</strong>
                        ${
                          trace.preview
                            ? `<span>${escapeHtml(truncate(trace.preview, 168))}</span>`
                            : ""
                        }
                      </li>
                    `,
                  )
                  .join("")}
              </ul>
            </section>
          `);
        }

        if (stage.error) {
          detailBlocks.push(`
            <section class="detail-section detail-section--error">
              <h4>Error</h4>
              <p class="detail-text">${escapeHtml(stage.error)}</p>
            </section>
          `);
        } else if (canExport) {
          detailBlocks.push(`
            <section class="detail-section detail-section--export">
              <div class="export-row">
                <div>
                  <h4>Export Markdown</h4>
                  <p class="detail-text">${escapeHtml(articleName)}</p>
                </div>
                <a
                  class="export-button"
                  href="/api/runs/${encodeURIComponent(detail.run_id)}/download/${encodeURIComponent(articleName)}"
                >
                  Download
                </a>
              </div>
            </section>
          `);
        } else if (artifactName) {
          detailBlocks.push(`
            <section class="detail-section">
              <h4>Artifact</h4>
              <p class="detail-text">${escapeHtml(artifactName)}</p>
            </section>
          `);
        }

        return `
          <article class="stage-card stage-card--${stage.status} ${isExpanded ? "is-expanded" : ""}">
            <button
              type="button"
              class="stage-toggle"
              data-stage="${escapeHtml(stage.stage)}"
              aria-expanded="${isExpanded ? "true" : "false"}"
            >
              <span class="stage-index">${index + 1}</span>
              ${statusIcon(stage.status)}
              <div class="stage-main">
                <div class="stage-heading">
                  <strong>${escapeHtml(stage.label)}</strong>
                  <span>${escapeHtml(stage.agent)}</span>
                </div>
              </div>
              <div class="stage-summary">
                <span class="stage-state">${statusLabel(stage.status)}</span>
                <span class="stage-duration">${formatDuration(stage.duration_seconds)}</span>
              </div>
            </button>

            <div class="stage-panel" ${isExpanded ? "" : "hidden"}>
              ${detailBlocks.join("") || '<p class="empty-state">Waiting for stage details...</p>'}
            </div>
          </article>
        `;
      }

      function renderStages() {
        const detail = state.selectedRunDetail;
        if (!detail) {
          els.stageList.innerHTML = '<p class="empty-state">No run selected yet.</p>';
          return;
        }

        const stages = detail.stage_views || [];
        els.stageList.innerHTML = stages.map((stage, index) => buildStageDetail(stage, index, stages.length)).join("");

        Array.from(document.querySelectorAll(".stage-toggle")).forEach((button) => {
          button.addEventListener("click", () => {
            const stageName = button.dataset.stage;
            const nextExpanded = state.expandedStage === stageName ? null : stageName;
            state.expandedStage = nextExpanded;
            setStoredExpandedStage(state.selectedRunId, nextExpanded);
            renderStages();
          });
        });
      }

      async function loadRunDetail(runId) {
        if (!runId) {
          state.selectedRunDetail = null;
          state.expandedStage = null;
          return;
        }

        try {
          const detail = await requestJson(`/api/runs/${encodeURIComponent(runId)}`);
          state.selectedRunDetail = detail;
          const availableStages = detail.stage_views || [];
          const storedStage = getStoredExpandedStage(runId);

          if (storedStage === NO_EXPANDED_STAGE) {
            state.expandedStage = null;
            return;
          }

          if (storedStage && availableStages.some((stage) => stage.stage === storedStage)) {
            state.expandedStage = storedStage;
            return;
          }

          state.expandedStage = defaultExpandedStage(availableStages);
          if (state.expandedStage) {
            setStoredExpandedStage(runId, state.expandedStage);
          }
        } catch (error) {
          state.selectedRunDetail = null;
          state.expandedStage = null;
          showFlash(normalizeErrorMessage(error), "error");
        }
      }

      function renderAll() {
        renderHeader();
        renderRecentRuns();
        renderPipelineSummary();
        renderStages();
        syncSidebarState();
      }

      async function loadDashboard() {
        try {
          state.status = await requestJson("/api/status");
          const nextRunId = chooseRunId(state.status);
          const shouldReloadDetail =
            nextRunId !== state.selectedRunId ||
            !state.selectedRunDetail ||
            (state.status.running && nextRunId === state.status.active_run_id);

          state.selectedRunId = nextRunId;
          persistSelectedRunId();

          if (shouldReloadDetail) {
            await loadRunDetail(nextRunId);
          }

          renderAll();
        } catch (error) {
          showFlash(normalizeErrorMessage(error), "error");
        }
      }

      els.runNow.addEventListener("click", async () => {
        try {
          showFlash("Starting pipeline run...");
          const payload = await requestJson("/api/runs/start", {
            method: "POST",
            body: JSON.stringify({ trigger: "manual" }),
          });
          state.status = payload;
          state.selectedRunId = payload.active_run_id || state.selectedRunId;
          persistSelectedRunId();
          state.selectedRunDetail = null;
          showFlash("Pipeline run started.", "success");
          await loadDashboard();
          closeSidebarIfDrawer();
        } catch (error) {
          showFlash(normalizeErrorMessage(error), "error");
        }
      });

      els.stopRun.addEventListener("click", async () => {
        try {
          showFlash("Stop requested. The current model call will finish, then the run will halt.", "success");
          const payload = await requestJson("/api/runs/stop", {
            method: "POST",
          });
          state.status = payload;
          await loadDashboard();
        } catch (error) {
          showFlash(normalizeErrorMessage(error), "error");
        }
      });

      els.resumeRun.addEventListener("click", async () => {
        if (!state.selectedRunId) {
          return;
        }
        try {
          showFlash("Resuming interrupted run...");
          const payload = await requestJson(`/api/runs/${encodeURIComponent(state.selectedRunId)}/resume`, {
            method: "POST",
          });
          state.status = payload;
          state.selectedRunDetail = null;
          showFlash("Run resumed.", "success");
          await loadDashboard();
          closeSidebarIfDrawer();
        } catch (error) {
          showFlash(normalizeErrorMessage(error), "error");
        }
      });

      els.refresh.addEventListener("click", async () => {
        showFlash("Refreshing...");
        await loadDashboard();
        showFlash("Dashboard updated.");
      });

      els.sidebarToggle.addEventListener("click", () => {
        setSidebarOpen(!state.sidebarOpen);
      });

      els.sidebarBackdrop.addEventListener("click", () => {
        setSidebarOpen(false);
      });

      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          setSidebarOpen(false);
        }
      });

      window.addEventListener("resize", () => {
        if (!isDrawerMode()) {
          setSidebarOpen(false);
        } else {
          syncSidebarState();
        }
      });

      loadDashboard();
      setInterval(loadDashboard, 3000);
    </script>
  </body>
</html>
